<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 运动大师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .api-selector {
            padding: 15px 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .api-selector label {
            font-weight: bold;
            color: #333;
            white-space: nowrap;
        }

        #api-select {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            background: white;
            cursor: pointer;
            outline: none;
            transition: border-color 0.3s;
        }

        #api-select:focus {
            border-color: #667eea;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-message {
            justify-content: flex-end;
        }

        .ai-message {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 15px 20px;
            border-radius: 20px;
            line-height: 1.6;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user-message .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .ai-message .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .input-container {
            display: flex;
            padding: 20px;
            background: white;
            border-top: 1px solid #eee;
        }

        #message-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #eee;
            border-radius: 30px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        #message-input:focus {
            border-color: #667eea;
        }

        #send-btn {
            margin-left: 15px;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s ease;
            font-weight: bold;
        }

        #send-btn:hover:not(:disabled) {
            transform: translateY(-2px);
        }

        #send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        #send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            text-align: center;
            padding: 10px;
            color: #666;
            font-size: 12px;
            background: #f5f5f5;
            border-top: 1px solid #eee;
        }

        .api-info {
            font-size: 12px;
            color: #666;
            margin-left: 10px;
            font-weight: normal;
        }

        .typing-indicator {
            display: inline-block;
            padding: 10px 15px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            margin: 0 2px;
            background: #667eea;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>AI 运动大师</h1>
        <p>你的专属运动健身咨询师</p>
    </div>

    <div class="api-selector">
        <label>API 接口：</label>
        <select id="api-select">
            <option value="sync">同步对话 - /api/ai/love_app/chat/sync</option>
            <option value="rag">📚 知识库问答 - /api/ai/love_app/chat/rag</option>
            <option value="sse" selected>SSE 流式对话 - /api/ai/love_app/chat/sse</option>
            <option value="server_sent_event">ServerSentEvent - /api/ai/love_app/chat/server_sent_event</option>
            <option value="sse_emitter">SseEmitter - /api/ai/love_app/chat/sse_emitter</option>
            <option value="manus">Manus 智能体 - /api/ai/manus/chat（支持工具调用）</option>
        </select>
        <span class="api-info" id="api-info">推荐：响应速度快，体验流畅</span>
    </div>

    <div class="chat-container" id="chat-container">
        <div class="message ai-message">
            <div class="message-content">
                你好！我是 AI 运动健身导师。无论你想减脂、塑形、增肌，还是提升体能，都可以告诉我你的目标与困扰，我会为你定制专属运动计划。请告诉我你的情况吧！
            </div>
        </div>
    </div>

    <div class="input-container">
        <input type="text" id="message-input" placeholder="请输入你的问题..." autocomplete="off">
        <button id="send-btn">发送</button>
    </div>

    <div class="status">
        <span>已连接</span>
    </div>
</div>

<script>
    const chatContainer = document.getElementById('chat-container');
    const messageInput = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const apiSelect = document.getElementById('api-select');
    const apiInfo = document.getElementById('api-info');

    let chatId = 'chat-' + Date.now();
    let isLoading = false;

    const apiInfoMap = {
        'sync': '简单直接，等待完整响应',
        'rag': '⭐ 基于体育运动知识库，回答更专业准确',
        'sse': '推荐：响应速度快，体验流畅',
        'server_sent_event': '标准 SSE 格式，结构化数据',
        'sse_emitter': 'Spring MVC SSE，长连接超时 3 分钟',
        'manus': '⭐ 支持工具调用（搜索、文件、PDF 等）'
    };

    // API 选择变化时更新提示
    apiSelect.addEventListener('change', () => {
        apiInfo.textContent = apiInfoMap[apiSelect.value] || '';
    });

    // 发送消息
    async function sendMessage() {
        const message = messageInput.value.trim();
        if (!message || isLoading) return;

        const apiType = apiSelect.value;

        // 添加用户消息到聊天容器
        addMessage(message, 'user');
        messageInput.value = '';

        // 显示加载状态
        isLoading = true;
        sendBtn.disabled = true;
        sendBtn.innerHTML = '<div class="loading"></div>';

        // 创建 AI 消息容器
        const aiMessageDiv = addMessage('', 'ai');
        const aiContentDiv = aiMessageDiv.querySelector('.message-content');

        // 显示打字指示器
        aiContentDiv.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

        try {
            let fullResponse = '';

            if (apiType === 'sync') {
                // 同步请求 - 使用相对路径（包含 /api 前缀）
                const response = await fetch(
                    `/api/ai/love_app/chat/sync?message=${encodeURIComponent(message)}&chatId=${chatId}`
                );
                fullResponse = await response.text();
                aiContentDiv.textContent = fullResponse;
            }
            else if (apiType === 'rag') {
                // 知识库问答请求 - 使用相对路径（包含 /api 前缀）
                const response = await fetch(
                    `/api/ai/love_app/chat/rag?message=${encodeURIComponent(message)}&chatId=${chatId}`
                );
                fullResponse = await response.text();
                aiContentDiv.textContent = fullResponse;
            }
            else if (apiType === 'sse') {
                // SSE 流式请求 - 使用相对路径（包含 /api 前缀）
                const response = await fetch(
                    `/api/ai/love_app/chat/sse?message=${encodeURIComponent(message)}&chatId=${chatId}`
                );
                fullResponse = await readSSEStream(response, aiContentDiv);
            }
            else if (apiType === 'server_sent_event') {
                // ServerSentEvent 格式 - 使用相对路径（包含 /api 前缀）
                const response = await fetch(
                    `/api/ai/love_app/chat/server_sent_event?message=${encodeURIComponent(message)}&chatId=${chatId}`
                );
                fullResponse = await readSSEStream(response, aiContentDiv, true);
            }
            else if (apiType === 'sse_emitter') {
                // SseEmitter 格式 - 使用相对路径（包含 /api 前缀）
                const response = await fetch(
                    `/api/ai/love_app/chat/sse_emitter?message=${encodeURIComponent(message)}&chatId=${chatId}`
                );
                fullResponse = await readSSEStream(response, aiContentDiv);
            }
            else if (apiType === 'manus') {
                // Manus 智能体（支持工具调用）- 使用相对路径（包含 /api 前缀）
                const response = await fetch(
                    `/api/ai/manus/chat?message=${encodeURIComponent(message)}&chatId=${chatId}`
                );
                fullResponse = await readManusStream(response, aiContentDiv);
            }

            // 如果没有收到有效回复
            if (!fullResponse.trim()) {
                aiContentDiv.textContent = '抱歉，我暂时无法回复你的问题，请稍后再试。';
            }

        } catch (error) {
            aiContentDiv.textContent = '抱歉，请求失败：' + error.message;
            console.error('Error:', error);
        } finally {
            // 恢复发送按钮
            isLoading = false;
            sendBtn.disabled = false;
            sendBtn.innerHTML = '发送';
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    }

    // 读取 SSE 流（通用）
    async function readSSEStream(response, contentDiv, isStructured = false) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';

        while (true) {
            const { done, value } = await reader.read();

            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                if (isStructured) {
                    // 处理 ServerSentEvent 格式：data: {...}
                    if (line.startsWith('data:')) {
                        try {
                            const data = JSON.parse(line.substring(5).trim());
                            if (data.data) {
                                fullText += data.data;
                                contentDiv.textContent = fullText;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }
                        } catch (e) {
                            // 如果不是 JSON，直接显示
                            const text = line.substring(5).trim();
                            if (text) {
                                fullText += text;
                                contentDiv.textContent = fullText;
                                chatContainer.scrollTop = chatContainer.scrollHeight;
                            }
                        }
                    }
                } else {
                    // 处理普通 SSE 格式
                    if (line.startsWith('data:')) {
                        const text = line.substring(5).trim();
                        if (text) {
                            fullText += text;
                            contentDiv.textContent = fullText;
                            chatContainer.scrollTop = chatContainer.scrollHeight;
                        }
                    }
                }
            }
        }

        return fullText;
    }

    // 读取 Manus 流（过滤中间日志）
    async function readManusStream(response, contentDiv) {
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullText = '';

        while (true) {
            const { done, value } = await reader.read();

            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop() || '';

            for (const line of lines) {
                if (line.startsWith('data:')) {
                    const data = line.substring(5).trim();

                    // 过滤掉中间日志，只显示最终回答
                    if (data &&
                        !data.includes('Step') &&
                        !data.includes('工具') &&
                        !data.includes('思考') &&
                        !data.includes('无需行动') &&
                        !data.includes('任务结束')) {
                        fullText += data;
                        contentDiv.textContent = fullText;
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }
                }
            }
        }

        return fullText;
    }

    // 添加消息到聊天容器
    function addMessage(content, sender) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}-message`;

        const contentDiv = document.createElement('div');
        contentDiv.className = 'message-content';
        contentDiv.textContent = content;

        messageDiv.appendChild(contentDiv);
        chatContainer.appendChild(messageDiv);

        // 滚动到底部
        chatContainer.scrollTop = chatContainer.scrollHeight;

        return messageDiv;
    }

    // 绑定事件
    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
</script>
</body>
</html>
